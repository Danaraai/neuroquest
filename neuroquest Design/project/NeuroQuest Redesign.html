<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroQuest — Redesign</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #040610; font-family: 'Inter', sans-serif; overflow: hidden; }
  #root { height: 100%; }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-7px); }
  }
  @keyframes approach {
    from { transform: scale(0.08) translateY(60px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }
  @keyframes run-bob {
    0%,100% { transform: translateY(0) rotate(-1.5deg); }
    50%      { transform: translateY(-5px) rotate(1.5deg); }
  }
  @keyframes ilya-leg-l {
    from { transform: rotate(-22deg); }
    to   { transform: rotate(22deg); }
  }
  @keyframes ilya-leg-r {
    from { transform: rotate(22deg); }
    to   { transform: rotate(-22deg); }
  }
  @keyframes pop-in {
    0%   { transform: scale(0.5); opacity: 0; }
    70%  { transform: scale(1.06); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes fade-up {
    from { transform: translateY(16px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  @keyframes glow-pulse {
    0%,100% { box-shadow: 0 0 14px currentColor; }
    50%      { box-shadow: 0 0 28px currentColor; }
  }
  @keyframes spark-out {
    0%   { transform: scale(0); opacity: 1; }
    100% { transform: scale(2.5); opacity: 0; }
  }
  @keyframes slide-in-left {
    from { transform: translateX(-30px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  @keyframes world-enter {
    0%   { transform: scale(0.6) translateY(20px); opacity: 0; }
    70%  { transform: scale(1.05) translateY(0); }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  .tab-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 7px 18px; color: #6A70A0; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: 'Nunito', sans-serif; }
  .tab-btn.active { background: rgba(0,220,255,0.12); border-color: rgba(0,220,255,0.35); color: #00DCFF; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: #252850; border-radius: 99px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="nq-ilya.jsx"></script>
<script type="text/babel" src="nq-home.jsx"></script>
<script type="text/babel" src="nq-transition.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const WORLDS_INTRO = [
  { name:'NeuroBasics',         icon:'🧬', color:'#F472B6', desc:'What is a brain? Neurons, synapses, the basics' },
  { name:'Python Village',      icon:'🏘️', color:'#FF8C42', desc:'Code your first neurons in Python' },
  { name:'Math Mountains',      icon:'⛰️', color:'#4ECDC4', desc:'Vectors, matrices & calculus intuition' },
  { name:'Stats Swamps',        icon:'🌿', color:'#95E1D3', desc:'Probability, distributions & randomness' },
  { name:'Neuro Jungle',        icon:'🌴', color:'#6BCF7F', desc:'Action potentials, brain signals, real neurons' },
  { name:'Computation Caves',   icon:'🪨', color:'#9B59FF', desc:'Build a spiking neuron model' },
  { name:'Consciousness',       icon:'🔮', color:'#A78BFA', desc:'What is awareness? Philosophy of mind' },
];

// ── Sparkle burst component ──────────────────────────────────
function Sparks({ color = '#00DCFF', count = 8 }) {
  return (
    <div style={{position:'absolute', inset:0, pointerEvents:'none'}}>
      {Array.from({length: count}).map((_,i) => {
        const angle = (i / count) * 360;
        const dist = 30 + Math.random() * 30;
        return (
          <div key={i} style={{
            position:'absolute', left:'50%', top:'50%',
            width: 6, height: 6, borderRadius: '50%',
            background: color,
            transform: `rotate(${angle}deg) translateX(${dist}px)`,
            animation: `spark-out 0.6s ease-out ${i*0.04}s both`,
            boxShadow: `0 0 6px ${color}`,
          }}/>
        );
      })}
    </div>
  );
}

// ── Intro Animation ──────────────────────────────────────────
const TOTAL_STEPS = 4;

function ContinueBtn({ label = 'Continue', onClick, color }) {
  return (
    <button onClick={onClick} style={{
      padding:'15px 32px', borderRadius:16, border:'none',
      background:`linear-gradient(135deg, ${color}, #58CC02)`,
      color:'#080A18', fontSize:15, fontWeight:900,
      fontFamily:"'Nunito',sans-serif", cursor:'pointer',
      boxShadow:`0 4px 24px ${color}44`, width:'100%',
    }}>{label}</button>
  );
}

function IntroAnimation({ tweaks, onStartTransition }) {
  const { accentColor = '#00DCFF' } = tweaks;
  const [step, setStep] = useState(0);
  const [showSparks, setShowSparks] = useState(false);
  const [path, setPath] = useState(null);

  const advance = useCallback(() => {
    if (step === 1) { setShowSparks(true); setTimeout(()=>setShowSparks(false), 700); }
    setStep(s => Math.min(s + 1, TOTAL_STEPS - 1));
  }, [step]);

  // Auto-advance step 0 → 1
  useEffect(() => {
    if (step === 0) {
      const t = setTimeout(() => setStep(1), 2200);
      return () => clearTimeout(t);
    }
  }, [step]);

  const W = 390, H = 780;

  return (
    <div style={{width:W, height:H, background:'#080A18', borderRadius:40, overflow:'hidden', position:'relative', flexShrink:0}}>
      {/* Stars */}
      <div style={{position:'absolute', inset:0, overflow:'hidden', pointerEvents:'none'}}>
        {Array.from({length:55}).map((_,i) => (
          <div key={i} style={{
            position:'absolute',
            left:`${(i*37+13)%100}%`, top:`${(i*53+7)%100}%`,
            width: (i%3)+1, height: (i%3)+1,
            borderRadius:'50%', background:'white',
            opacity: 0.06 + (i%5)*0.03,
            animation:`float ${2+(i%3)}s ease-in-out ${(i%4)*0.8}s infinite`,
          }}/>
        ))}
      </div>
      <NeuronCanvas width={W} height={H} density={0.3} color={accentColor}/>

      {/* STEP 0 — Ilya runs in */}
      {step === 0 && (
        <div style={{position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center'}}>
          <div style={{animation:'approach 2s cubic-bezier(0.34,1.4,0.64,1) forwards'}}>
            <div style={{animation:'run-bob 0.32s ease-in-out infinite'}}>
              <IlyaSVG state="run" size={140}/>
            </div>
          </div>
        </div>
      )}

      {/* STEP 1 — Ilya greets */}
      {step === 1 && (
        <div style={{position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:20, padding:'0 30px'}}>
          {showSparks && <Sparks color={accentColor} count={14}/>}
          <div style={{animation:'pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both'}}>
            <IlyaSVG state="celebrate" size={150}/>
          </div>
          <div style={{animation:'fade-up 0.5s 0.2s ease-out both', textAlign:'center'}}>
            <div style={{fontSize:28, fontWeight:900, color:'#F0F0FF', fontFamily:"'Nunito',sans-serif", lineHeight:1.2, marginBottom:8}}>
              Hi! I'm <span style={{color:accentColor}}>Ilya</span>, your Neuro Guide! 🦌
            </div>
            <div style={{fontSize:14, color:'#8890C0', lineHeight:1.7}}>
              I'll be your partner and companion<br/>on this journey of learning neuroscience.<br/>
              <span style={{color:'#C0C4E8', fontWeight:600}}>Welcome to NeuroQuest.</span>
            </div>
          </div>
          <div style={{animation:'fade-up 0.5s 0.5s ease-out both', background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:16, padding:'14px 18px', textAlign:'center'}}>
            <p style={{fontSize:13, color:'#A0A8D0', lineHeight:1.65, margin:0}}>
              Your brain is the most powerful computer<br/>on Earth — and you're about to learn<br/>exactly how it works. 🧠✨
            </p>
          </div>
          <div style={{animation:'fade-up 0.5s 0.8s ease-out both', width:'100%'}}>
            <ContinueBtn label="Let's go! →" onClick={advance} color={accentColor}/>
          </div>
        </div>
      )}

      {/* STEP 2 — Path selection (multi-select) */}
      {step === 2 && (
        <div style={{position:'absolute', inset:0, display:'flex', flexDirection:'column', padding:'28px 22px 22px', overflowY:'auto'}}>
          <div style={{animation:'fade-up 0.4s ease-out both', textAlign:'center', marginBottom:18}}>
            <div style={{fontSize:13, fontWeight:700, color:accentColor, letterSpacing:'1.5px', marginBottom:5}}>CHOOSE YOUR PATH</div>
            <div style={{fontSize:21, fontWeight:900, color:'#F0F0FF', fontFamily:"'Nunito',sans-serif", lineHeight:1.3}}>What kind of explorer are you?</div>
            <div style={{fontSize:12, color:'#5A6090', marginTop:7, lineHeight:1.6}}>
              Pick one or more — you're not locked in.<br/>All worlds are open to everyone.
            </div>
          </div>

          <div style={{display:'flex', flexDirection:'column', gap:10, marginBottom:16}}>
            {[
              {
                id:'computational', icon:'🔬', color:'#4ECDC4',
                title:'Computational Neuroscientist',
                tag:'For NMA prep',
                desc:'The serious path. Learn Python, master the math, understand statistics, then dive into real computational neuroscience. This is exactly how you prepare for Neuromatch Academy.',
                route:'NeuroBasics → Python → Math → Stats → Neuro Jungle → Computation Caves',
              },
              {
                id:'explorer', icon:'🧠', color:'#6BCF7F',
                title:'Brain Explorer',
                tag:'Lighter path',
                desc:'Discover how neurons fire, how the brain thinks, and what makes us human. A beautiful journey through the science of the mind — no coding needed.',
                route:'NeuroBasics → Neuro Jungle',
              },
              {
                id:'ai', icon:'⚡', color:'#F59E0B',
                title:'Brain & AI',
                tag:'Hot topic',
                desc:"Hinton, LeCun, Sutskever — the AI revolution was inspired by the brain. Learn how real neurons became artificial neural networks, and why understanding the brain unlocks the future of AI.",
                route:'NeuroBasics → Neuro Jungle → Neural Networks (coming soon)',
              },
              {
                id:'consciousness', icon:'🔮', color:'#A78BFA',
                title:'Consciousness Explorer',
                tag:'Coming soon',
                desc:'What is consciousness? Explore the philosophical and scientific frontier of mind, awareness, and what it means to be alive.',
                route:'NeuroBasics → Consciousness',
                comingSoon: true,
              },
            ].map((p, i) => {
              const selected = path && (Array.isArray(path) ? path.includes(p.id) : path === p.id);
              return (
                <div key={p.id}
                  onClick={() => {
                    if (p.comingSoon) return;
                    setPath(prev => {
                      const arr = prev ? (Array.isArray(prev) ? prev : [prev]) : [];
                      return arr.includes(p.id) ? arr.filter(x=>x!==p.id) : [...arr, p.id];
                    });
                  }}
                  style={{
                    animation:`world-enter 0.4s ${i*0.1}s both`,
                    background: selected ? `${p.color}18` : 'rgba(255,255,255,0.02)',
                    border: `2px solid ${selected ? p.color : p.color+'28'}`,
                    borderRadius:16, padding:'14px', cursor: p.comingSoon ? 'default' : 'pointer',
                    opacity: p.comingSoon ? 0.55 : 1, transition:'all 0.2s',
                  }}>
                  <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:6}}>
                    <div style={{width:38, height:38, borderRadius:11, background:`${p.color}1A`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, flexShrink:0}}>{p.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{display:'flex', alignItems:'center', gap:7}}>
                        <span style={{fontSize:13, fontWeight:800, color:'#F0F0FF', fontFamily:"'Nunito',sans-serif"}}>{p.title}</span>
                        <span style={{fontSize:10, fontWeight:700, color:p.color, background:`${p.color}18`, padding:'2px 7px', borderRadius:99}}>{p.tag}</span>
                      </div>
                    </div>
                    {!p.comingSoon && (
                      <div style={{width:20, height:20, borderRadius:'50%', border:`2px solid ${selected?p.color:'rgba(255,255,255,0.15)'}`, background:selected?p.color:'transparent', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
                        {selected && <span style={{fontSize:11, color:'#080A18', fontWeight:900}}>✓</span>}
                      </div>
                    )}
                  </div>
                  <div style={{fontSize:12, color:'#7A80A8', lineHeight:1.55, marginBottom:7}}>{p.desc}</div>
                  <div style={{fontSize:10, color:p.color, fontWeight:700, opacity:0.7}}>📍 {p.route}</div>
                </div>
              );
            })}
          </div>

          <div style={{display:'flex', flexDirection:'column', gap:8, animation:'fade-up 0.4s 0.4s ease-out both'}}>
            <ContinueBtn
              label={path && (Array.isArray(path)?path.length>0:true) ? 'Start exploring! →' : 'Continue anyway →'}
              onClick={advance} color={accentColor}
            />
            <button onClick={advance} style={{background:'transparent', border:'none', color:'#4A4E78', fontSize:11, fontWeight:600, cursor:'pointer'}}>
              Skip — show me all worlds
            </button>
          </div>
        </div>
      )}

      {/* STEP 3 — World map + CTA */}
      {step === 3 && (
        <div style={{position:'absolute', inset:0, display:'flex', flexDirection:'column', padding:'32px 24px 24px'}}>
          <div style={{animation:'fade-up 0.4s ease-out both', marginBottom:16, display:'flex', alignItems:'center', gap:12}}>
            <IlyaSVG state="idle" size={52}/>
            <div>
              <div style={{fontSize:13, fontWeight:700, color:accentColor, letterSpacing:'1px'}}>YOUR ADVENTURE</div>
              <div style={{fontSize:20, fontWeight:900, color:'#F0F0FF', fontFamily:"'Nunito',sans-serif"}}>5 Worlds to Discover</div>
              <div style={{fontSize:12, color:'#6A70A0', marginTop:2}}>Start anywhere. Follow the path or forge your own.</div>
            </div>
          </div>

          <div style={{flex:1, display:'flex', flexDirection:'column', gap:9, overflowY:'auto'}}>
            {WORLDS_INTRO.map((w, i) => (
              <div key={w.name} style={{
                animation:`world-enter 0.4s ${i*0.08}s both`,
                display:'flex', alignItems:'center', gap:12,
                background:`${w.color}0D`, border:`1px solid ${w.color}30`,
                borderRadius:14, padding:'12px 14px', position:'relative',
              }}>
                {i < WORLDS_INTRO.length-1 && (
                  <div style={{position:'absolute', left:25, bottom:-10, width:2, height:10, background:`${w.color}33`}}/>
                )}
                <div style={{width:40, height:40, borderRadius:12, background:`${w.color}1A`, border:`1px solid ${w.color}40`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, flexShrink:0}}>{w.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13, fontWeight:800, color:'#F0F0FF', fontFamily:"'Nunito',sans-serif"}}>{w.name}</div>
                  <div style={{fontSize:11, color:'#5A6090', marginTop:1}}>{w.desc}</div>
                </div>
                <div style={{width:7, height:7, borderRadius:'50%', background:w.color, boxShadow:`0 0 8px ${w.color}`, animation:'float 2.5s ease-in-out infinite'}}/>
              </div>
            ))}
          </div>

          <div style={{marginTop:16, display:'flex', flexDirection:'column', gap:10, animation:'fade-up 0.4s 0.5s ease-out both'}}>
            <ContinueBtn label="Start my journey! 🚀" onClick={() => onStartTransition && onStartTransition()} color={accentColor}/>
            <button style={{background:'transparent', border:'1px solid rgba(255,255,255,0.08)', borderRadius:14, padding:'12px', color:'#6A70A0', fontSize:13, fontWeight:700, fontFamily:"'Nunito',sans-serif", cursor:'pointer'}}>
              See the World Map first
            </button>
          </div>
        </div>
      )}

      {/* Step dots */}
      <div style={{position:'absolute', bottom:14, left:0, right:0, display:'flex', justifyContent:'center', gap:6, zIndex:10, pointerEvents:'none'}}>
        {Array.from({length:TOTAL_STEPS}).map((_,i) => (
          <div key={i} style={{width:i===step?20:6, height:6, borderRadius:99, background:i===step?accentColor:'rgba(255,255,255,0.12)', transition:'all 0.3s'}}/>
        ))}
      </div>
    </div>
  );
}

// ── Tweaks Panel ─────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#00DCFF",
  "neuronDensity": 0.8,
  "ilyaSize": 70,
  "greeting": "calm"
}/*EDITMODE-END*/;

function TweaksPanel({ tweaks, setTweaks, visible }) {
  if (!visible) return null;
  const set = (k, v) => {
    const next = {...tweaks, [k]:v};
    setTweaks(next);
    window.parent.postMessage({type:'__edit_mode_set_keys', edits: next}, '*');
  };
  const btn = (k, v, label) => (
    <button onClick={() => set(k, v)} style={{
      padding:'6px 12px', borderRadius:8, border:'1px solid rgba(255,255,255,0.1)',
      background: tweaks[k]===v ? 'rgba(0,220,255,0.15)' : 'rgba(255,255,255,0.04)',
      color: tweaks[k]===v ? '#00DCFF' : '#8890B0', fontSize:12, fontWeight:700, cursor:'pointer',
      fontFamily:"'Nunito',sans-serif",
    }}>{label}</button>
  );
  return (
    <div style={{
      position:'fixed', bottom:24, right:24, zIndex:1000,
      background:'#0E1028', border:'1px solid rgba(255,255,255,0.1)',
      borderRadius:20, padding:'20px 22px', width:260,
      boxShadow:'0 8px 40px rgba(0,0,0,0.6)',
      fontFamily:"'Inter',sans-serif",
    }}>
      <div style={{fontSize:13, fontWeight:800, color:'#F0F0FF', fontFamily:"'Nunito',sans-serif", marginBottom:16}}>Tweaks</div>

      <div style={{marginBottom:14}}>
        <div style={{fontSize:11, color:'#4A4E78', fontWeight:600, marginBottom:7}}>ACCENT COLOR</div>
        <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
          {btn('accentColor','#00DCFF','Cyan')}
          {btn('accentColor','#58CC02','Green')}
          {btn('accentColor','#FF8C42','Amber')}
          {btn('accentColor','#9B59FF','Purple')}
        </div>
      </div>

      <div style={{marginBottom:14}}>
        <div style={{fontSize:11, color:'#4A4E78', fontWeight:600, marginBottom:7}}>NEURON DENSITY</div>
        <div style={{display:'flex', gap:8}}>
          {btn('neuronDensity',0,'Off')}
          {btn('neuronDensity',0.4,'Subtle')}
          {btn('neuronDensity',0.8,'Vibrant')}
        </div>
      </div>

      <div style={{marginBottom:14}}>
        <div style={{fontSize:11, color:'#4A4E78', fontWeight:600, marginBottom:7}}>ILYA SIZE</div>
        <div style={{display:'flex', gap:8}}>
          {btn('ilyaSize',70,'Small')}
          {btn('ilyaSize',88,'Normal')}
          {btn('ilyaSize',110,'Big')}
        </div>
      </div>

      <div>
        <div style={{fontSize:11, color:'#4A4E78', fontWeight:600, marginBottom:7}}>ILYA'S GREETING</div>
        <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
          {btn('greeting','cheerful','Cheerful')}
          {btn('greeting','calm','Calm')}
          {btn('greeting','excited','Excited')}
        </div>
      </div>
    </div>
  );
}

// ── App Shell ────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('intro');
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);
  const [showTransition, setShowTransition] = useState(false);

  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode')   setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    });
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    // Restore last tab
    const saved = localStorage.getItem('nq-tab');
    if (saved) setTab(saved);
  }, []);

  const switchTab = t => { setTab(t); localStorage.setItem('nq-tab', t); };
  const { accentColor = '#00DCFF' } = tweaks;

  return (
    <div style={{height:'100%', display:'flex', flexDirection:'column', background:'#040610', overflow:'hidden'}}>
      {/* Top bar */}
      <div style={{padding:'14px 24px 12px', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:'1px solid rgba(255,255,255,0.05)', flexShrink:0}}>
        <div style={{display:'flex', alignItems:'center', gap:8}}>
          <IlyaSVG state="idle" size={28}/>
          <span style={{fontFamily:"'Nunito',sans-serif", fontWeight:900, fontSize:15, color:'#F0F0FF'}}>NeuroQuest</span>
          <span style={{fontSize:11, color:'#4A4E78', fontWeight:600, marginLeft:4}}>UI Redesign</span>
        </div>
        <div style={{display:'flex', gap:8}}>
          {[['intro','Intro Animation'],['phone','Home — Phone'],['desktop','Home — Desktop'],['resources','Resources']].map(([id,label])=>(
            <button key={id} className={`tab-btn${tab===id?' active':''}`} onClick={()=>switchTab(id)}
              style={tab===id?{borderColor:`${accentColor}55`, color:accentColor, background:`${accentColor}15`}:{}}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {/* Canvas area */}
      <div style={{flex:1, display:'flex', alignItems:'center', justifyContent:'center', overflow:'auto', padding:32, gap:32}}>
        {tab === 'intro' && (
          <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:16}}>
            <div style={{fontSize:12, color:'#3A4070', fontWeight:600, letterSpacing:'0.5px'}}>TAP THROUGH THE SEQUENCE</div>
            {showTransition
              ? <NeuronFormation
                  color={tweaks.accentColor || '#00DCFF'}
                  onComplete={() => { setShowTransition(false); switchTab('phone'); }}
                />
              : <IntroAnimation
                  tweaks={tweaks}
                  onStartTransition={() => setShowTransition(true)}
                />
            }
          </div>
        )}

        {tab === 'phone' && (
          <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:12}}>
            <div style={{fontSize:11, color:'#3A4070', fontWeight:700, letterSpacing:'0.5px'}}>HOME SCREEN — PHONE</div>
            <HomePhone tweaks={tweaks}/>
          </div>
        )}

        {tab === 'desktop' && (
          <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:16}}>
            <HomeDesktop tweaks={tweaks}/>
          </div>
        )}

        {tab === 'resources' && (
          <div style={{maxWidth:640, width:'100%', fontFamily:"'Inter',sans-serif"}}>
            <div style={{marginBottom:28}}>
              <div style={{fontSize:11, fontWeight:700, color:'#4A4E78', letterSpacing:'1px', marginBottom:8}}>ATTRIBUTION & CREDITS</div>
              <div style={{fontSize:24, fontWeight:900, color:'#F0F0FF', fontFamily:"'Nunito',sans-serif"}}>Resources</div>
              <div style={{fontSize:13, color:'#6A70A0', marginTop:6}}>NeuroQuest is built on world-class open educational materials.</div>
            </div>

            <div style={{background:'rgba(78,205,196,0.06)', border:'1px solid rgba(78,205,196,0.2)', borderRadius:18, padding:'22px 24px', marginBottom:14}}>
              <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:14}}>
                <div style={{width:44, height:44, borderRadius:12, background:'rgba(78,205,196,0.15)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:22}}>🎓</div>
                <div>
                  <div style={{fontSize:16, fontWeight:800, color:'#F0F0FF', fontFamily:"'Nunito',sans-serif"}}>Neuromatch Academy</div>
                  <div style={{fontSize:12, color:'#4ECDC4'}}>Computational Neuroscience Course</div>
                </div>
              </div>
              <div style={{fontSize:13, color:'#A0A8C0', lineHeight:1.7, marginBottom:16}}>
                NeuroQuest adapts content from Neuromatch Academy's open Computational Neuroscience curriculum, used under a <strong style={{color:'#F0F0FF'}}>CC-BY 4.0 license</strong>. Content has been modified, restructured, and gamified.
              </div>
              <div style={{background:'rgba(0,0,0,0.3)', borderRadius:12, padding:'14px 16px', fontSize:12, color:'#8890B0', lineHeight:1.7, marginBottom:14, fontStyle:'italic'}}>
                "Adapted from Neuromatch Academy's Computational Neuroscience course under CC-BY 4.0. Modified for gamified learning. Source: github.com/NeuromatchAcademy/course-content"
              </div>
              <div style={{display:'flex', gap:10, flexWrap:'wrap'}}>
                {[
                  ['📁 Source on GitHub','https://github.com/NeuromatchAcademy/course-content','rgba(78,205,196,0.12)','rgba(78,205,196,0.3)','#4ECDC4'],
                  ['📖 Course Book','https://compneuro.neuromatch.io','rgba(78,205,196,0.12)','rgba(78,205,196,0.3)','#4ECDC4'],
                  ['⚖️ CC-BY 4.0','https://creativecommons.org/licenses/by/4.0/','rgba(255,255,255,0.04)','rgba(255,255,255,0.1)','#8890B0'],
                  ['🔗 NMA Open Resources','https://neuromatch.io/open-education-resources/','rgba(255,255,255,0.04)','rgba(255,255,255,0.1)','#8890B0'],
                ].map(([label,href,bg,border,color]) => (
                  <a key={label} href={href} target="_blank" style={{padding:'8px 14px', borderRadius:10, background:bg, border:`1px solid ${border}`, color, fontSize:12, fontWeight:700, textDecoration:'none'}}>{label}</a>
                ))}
              </div>
            </div>

            <div style={{background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.07)', borderRadius:18, padding:'20px 22px', marginBottom:14}}>
              <div style={{fontSize:14, fontWeight:800, color:'#F0F0FF', fontFamily:"'Nunito',sans-serif", marginBottom:12}}>What's adapted from NMA</div>
              {[
                ['Python Workshops W0D1–W0D2','Adapted into Python Village quests 1.1–1.7'],
                ['CompNeuro prerequisites','Adapted across all 5 worlds'],
                ['LIF neuron exercises','Adapted into Computation Caves coding missions'],
                ['Mathematical tools content','Adapted into Math Mountains & Stats Swamps'],
              ].map(([source,use]) => (
                <div key={source} style={{display:'flex', gap:10, marginBottom:10, alignItems:'flex-start'}}>
                  <div style={{width:6, height:6, borderRadius:'50%', background:'#4ECDC4', marginTop:5, flexShrink:0}}/>
                  <div>
                    <div style={{fontSize:13, color:'#C0C4E8', fontWeight:600}}>{source}</div>
                    <div style={{fontSize:12, color:'#5A6090', marginTop:1}}>{use}</div>
                  </div>
                </div>
              ))}
            </div>

            <div style={{background:'rgba(155,89,255,0.06)', border:'1px solid rgba(155,89,255,0.15)', borderRadius:18, padding:'18px 22px'}}>
              <div style={{fontSize:14, fontWeight:800, color:'#F0F0FF', fontFamily:"'Nunito',sans-serif", marginBottom:8}}>Connect with the NMA community</div>
              <div style={{fontSize:13, color:'#8890B0', lineHeight:1.65, marginBottom:12}}>
                NeuroQuest was built as a personal prep tool for Neuromatch Academy. Join the community to learn alongside others.
              </div>
              <a href="https://www.reddit.com/r/neuromatch/" target="_blank" style={{display:'inline-flex', alignItems:'center', gap:8, padding:'9px 16px', borderRadius:10, background:'rgba(155,89,255,0.15)', border:'1px solid rgba(155,89,255,0.3)', color:'#C084FF', fontSize:13, fontWeight:700, textDecoration:'none'}}>
                💬 r/neuromatch on Reddit
              </a>
            </div>
          </div>
        )}
      </div>

      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={showTweaks}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
